<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rainfall Prediction System</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #fff;
            padding: 30px 40px;
            border-radius: 12px;
            width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        label {
            font-weight: bold;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 18px;
            background: #6c63ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #5848d8;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🌧️ Rainfall Prediction System</h2>

    <form action="/predict" method="post">

        <div class="form-group">
            <label>Min Temperature (°C)</label>
            <input type="number" step="any" name="MinTemp" required>
        </div>

        <div class="form-group">
            <label>Max Temperature (°C)</label>
            <input type="number" step="any" name="MaxTemp" required>
        </div>

        <div class="form-group">
            <label>Rainfall (mm)</label>
            <input type="number" step="any" name="Rainfall" required>
        </div>

        <div class="form-group">
            <label>Humidity at 9 AM (%)</label>
            <input type="number" step="any" name="Humidity9am" required>
        </div>

        <div class="form-group">
            <label>Humidity at 3 PM (%)</label>
            <input type="number" step="any" name="Humidity3pm" required>
        </div>

        <div class="form-group">
            <label>Pressure at 9 AM (hPa)</label>
            <input type="number" step="any" name="Pressure9am" required>
        </div>

        <div class="form-group">
            <label>Pressure at 3 PM (hPa)</label>
            <input type="number" step="any" name="Pressure3pm" required>
        </div>

        <div class="form-group">
            <label>Temperature at 9 AM (°C)</label>
            <input type="number" step="any" name="Temp9am" required>
        </div>

        <div class="form-group">
            <label>Temperature at 3 PM (°C)</label>
            <input type="number" step="any" name="Temp3pm" required>
        </div>

        <div class="form-group">
            <label>Rain Today</label>
            <select name="RainToday" required>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>
        </div>

        <button type="submit">Predict Rainfall</button>
    </form>
</div>

</body>
</html>
